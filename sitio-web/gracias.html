<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--orange:#ea5536;--accent:#f96a17;--bg:#0c0a09;--txt:#f5f3f1;--mut:#b3aaa4}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .check{width:88px;height:88px;border-radius:50%;background:var(--orange);display:flex;align-items:center;
    justify-content:center;margin:0 auto 24px;font-size:46px;animation:pop .5s ease both}
  @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  h1{font-size:30px;font-weight:900;letter-spacing:-1px;margin-bottom:10px}
  p{color:var(--mut);max-width:420px;margin:0 auto 26px}
  a{display:inline-block;padding:13px 22px;border-radius:10px;background:var(--orange);color:#fff;
    text-decoration:none;font-weight:800}
</style>
</head>
<body>
<main>
  <div class="check">✓</div>
  <h1>¡Consulta enviada!</h1>
  <p>Gracias por escribirme. Te respondo en horas con el alcance y el costo. — David Valor</p>
  <a href="/">Volver al inicio</a>
</main>
</body>
</html>
