<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Grotesk:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 50%, #0d1b3e 100%);
    font-family: 'Inter', sans-serif; color: white;
    position: relative;
  }
  .glow {
    position: absolute; top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(0, 229, 255, 0.35) 0%, transparent 60%);
    filter: blur(40px);
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0, 229, 255, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 229, 255, 0.08) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  .content {
    position: relative; z-index: 2;
    display: flex; align-items: center; height: 100%;
    padding: 0 70px; gap: 60px;
  }
  .photo-wrap {
    flex-shrink: 0;
    width: 420px; height: 420px;
    border-radius: 30px;
    border: 4px solid #00e5ff;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0, 229, 255, 0.6), inset 0 0 30px rgba(0, 229, 255, 0.2);
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .text-block { flex: 1; }
  .badge {
    display: inline-block;
    background: #00e5ff; color: #0a0e27;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 22px;
    padding: 8px 18px; border-radius: 6px;
    margin-bottom: 24px; letter-spacing: 1px;
  }
  h1 {
    font-size: 96px; font-weight: 900; line-height: 0.95;
    letter-spacing: -2px;
    margin-bottom: 24px;
  }
  h1 .accent { color: #00e5ff; }
  .sub {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 700;
    color: #a0b3d6; letter-spacing: 2px;
  }
  .corner {
    position: absolute; bottom: 30px; right: 40px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px; color: #4a5a8a; letter-spacing: 3px;
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="photo-wrap"><img src="profile.png"></div>
    <div class="text-block">
      <div class="badge">AI ENGINEER</div>
      <h1>I BUILD<br><span class="accent">AI APPS</span><br>THAT SHIP</h1>
      <div class="sub">CHATGPT · CLAUDE · RAG</div>
    </div>
  </div>
  <div class="corner">DAVID VALOR</div>
</body>
</html>
