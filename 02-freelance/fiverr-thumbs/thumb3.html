<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: radial-gradient(ellipse at top left, #1e0a3c 0%, #0a0419 60%, #000 100%);
    font-family: 'Inter', sans-serif; color: white;
    position: relative;
  }
  .terminal {
    position: absolute; bottom: 40px; left: 70px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; color: #00ff88;
    opacity: 0.5;
  }
  .terminal .prompt { color: #b964ff; }
  .glow1 {
    position: absolute; top: -150px; left: -150px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(185, 100, 255, 0.4) 0%, transparent 60%);
    filter: blur(50px);
  }
  .glow2 {
    position: absolute; bottom: -200px; right: -100px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(255, 80, 180, 0.3) 0%, transparent 60%);
    filter: blur(60px);
  }
  .content {
    position: relative; z-index: 2;
    text-align: center; padding-top: 70px;
  }
  .photo-wrap {
    width: 240px; height: 240px;
    border-radius: 50%;
    margin: 0 auto 30px;
    border: 5px solid #b964ff;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(185, 100, 255, 0.8);
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  h1 {
    font-size: 92px; font-weight: 900; line-height: 0.95;
    letter-spacing: -2px; margin-bottom: 18px;
  }
  h1 .gradient {
    background: linear-gradient(90deg, #b964ff 0%, #ff50b4 50%, #ff8a3d 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px; font-weight: 700;
    color: #00ff88; letter-spacing: 2px;
  }
  .ribbon {
    position: absolute; top: 30px; right: -50px;
    background: linear-gradient(90deg, #b964ff, #ff50b4);
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 18px;
    padding: 8px 60px;
    transform: rotate(35deg);
    letter-spacing: 2px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="terminal">
    <div><span class="prompt">$</span> build --idea "your vision"</div>
    <div><span class="prompt">→</span> deploying... [████████] 100%</div>
  </div>
  <div class="ribbon">AI POWERED</div>
  <div class="content">
    <div class="photo-wrap"><img src="profile.png"></div>
    <h1>I CODE WHAT<br>YOU <span class="gradient">IMAGINE</span></h1>
    <div class="sub">{ APPS · BOTS · AUTOMATIONS }</div>
  </div>
</body>
</html>
